name: Daily AI Topics

on:
  schedule:
    # 毎日 22:05 UTC = 翌日 7:05 JST ごろ
    - cron: "5 22 * * *"
  workflow_dispatch:

jobs:
  build-daily-topics:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ← これを追加（git push のため）

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ここに外部ライブラリが増えたら追加
          # 例: pip install requests

      - name: Run fetch_and_summarize.py
        run: |
          python scripts/fetch_and_summarize.py

      - name: Commit and push generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain public)" ]; then
            git add public
            git commit -m "Update daily topics"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build-daily-topics
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
